version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node --version  # Log the version for debugging
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: docs/dist
    files:
      - '**/*'
      - '.vocs/**/*'
  cache:
    paths:
      - '.npm/**/*'
      - 'node_modules/**/*'